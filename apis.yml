aid: swarmia
url: https://raw.githubusercontent.com/api-evangelist/swarmia/refs/heads/main/apis.yml
name: Swarmia
kind: company
description: Swarmia is an engineering-effectiveness analytics platform that combines
  software delivery metrics (DORA), developer experience, investment balance, and
  AI adoption insights. Its REST API lets teams export built-in and custom reports,
  ingest deployment and events data, manage teams and memberships, and record time
  off, authenticated with Bearer API tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Engineering Effectiveness
- Developer Productivity
- DORA
- Software Delivery
- Analytics
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
apis:
- aid: swarmia:metrics-export-api
  name: Swarmia Metrics Export API
  tags:
  - Metrics
  - DORA
  - Reports
  - Export
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
