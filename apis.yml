  - url: collections/swarmia.postman_collection.json
    type: PostmanCollection
  - url: collections/swarmia.opencollection.json
    type: OpenCollection
  description: Machine-readable, built-in and custom reports - code metrics, DORA
    metrics, AI assistant adoption, and saved custom reports - retrieved as JSON or
    CSV using a Bearer API token with the entityQuery scope.
- aid: swarmia:deployments-events-ingestion-api
  name: Swarmia Deployments & Events Ingestion API
  tags:
  - Deployments
  - Events
  - Ingestion
  - DORA
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.swarmia.com/settings/organization/configuring-deployments-in-swarmia/generate-deployments-via-the-deployment-api
  baseURL: https://hook.swarmia.com
  properties:
  - url: https://help.swarmia.com/settings/organization/configuring-deployments-in-swarmia/generate-deployments-via-the-deployment-api
    type: Documentation
  - url: openapi/swarmia-openapi.yml
    type: OpenAPI
  - url: collections/swarmia.postman_collection.json
    type: PostmanCollection
  - url: collections/swarmia.opencollection.json
    type: OpenCollection
  description: Posts deployment and fix-deployment events to Swarmia (POST https://hook.swarmia.com/deployments)
    so delivery and DORA metrics reflect manual or CI/CD releases, plus daily AI-tool
    usage ingestion for external assistants.
