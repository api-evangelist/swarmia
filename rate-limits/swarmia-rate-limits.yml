specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Swarmia
providerId: swarmia
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Engineering Effectiveness
- Developer Productivity
- Analytics
- Rate Limiting
- Quotas
- Throttling
description: >-
  Swarmia's REST API is authenticated with per-organization Bearer API tokens
  and intended for periodic export, ingestion, and management workflows rather
  than high-frequency real-time traffic. Swarmia does not publish specific
  numeric request-per-minute or request-per-day quotas in its public API
  documentation; clients should treat the API as rate-limited and back off on
  throttling responses. Specific limits are not reconciled in this artifact.
notes: >-
  Verify any published or per-token limits with Swarmia support on
  reconciliation. Report endpoints default to the last 7 days of data when no
  timeframe is supplied, which naturally bounds response size.
sources:
- https://help.swarmia.com/settings/integrations/swarmia-apis
- https://help.swarmia.com/settings/integrations/swarmia-apis/export-api
responseCodes:
  throttled: 429
limits:
- name: Requests Per Minute (RPM)
  scope: token
  metric: requests
  limit: see provider documentation
  notes: No public numeric RPM published; treat as rate-limited and back off on 429.
- name: Requests Per Day (RPD)
  scope: token
  metric: requests
  limit: see provider documentation
  notes: No public numeric RPD published.
- name: Report Window
  scope: request
  metric: timeframe
  limit: default last 7 days (UTC) when timeframe omitted
  notes: Bounds the data range returned by report endpoints unless startDate/endDate set.
policies:
- name: Bearer Token Scoping
  description: Tokens carry scopes (e.g. entityQuery for reports, aiUsage for ingestion); requests outside a token's scope are rejected.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor Retry-After on 429 responses.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
