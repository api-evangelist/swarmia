description: >-
  FinOps view of Swarmia spend. Swarmia bills a per-developer-per-month
  subscription where billable seats equal the number of unique team members
  added to teams, rather than metering API calls. Cost is therefore driven by
  plan tier (Startup free, Lite, Standard, Enterprise) multiplied by seat
  count, with annual plans discounted versus monthly. The API itself is a
  plan entitlement, so the primary FinOps levers are seat hygiene and plan
  selection, not request volume.
notes: >-
  Per-seat list prices are subject to change and to volume discounting; verify
  against the Swarmia pricing page and your order form during reconciliation.
