meters:
- name: billable_seats
  description: Unique team members added to teams, billed per developer per month by plan tier.
  unit: developers
  aggregation: max
  dimensions:
  - organization
  - plan
- name: plan_tier
  description: Subscription tier (Startup, Lite, Standard, Enterprise) selected for the organization.
  unit: plan
  aggregation: latest
  dimensions:
  - organization
- name: billing_term
  description: Monthly or annual commitment; annual terms are discounted.
  unit: term
  aggregation: latest
  dimensions:
  - organization
principles:
- name: Visibility
  description: Use the Team Management API to inventory members per team and reconcile billable seats against the invoice.
- name: Allocation
  description: Map teams and parent teams to cost centers; attribute the per-developer subscription to the owning org units.
- name: Optimization
  description: Remove inactive members from teams to reduce billable seats; choose the lowest sufficient plan tier; prefer annual terms for the discount.
- name: Accountability
  description: Assign an owner for seat hygiene and plan review; reconcile seat counts and tier each renewal cycle.
